name: CI

on:
  repository_dispatch:
    types: [Component_update]
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths-ignore:
      - '**.MD'
      - '**.gitkeep'
      - '**.gitignore'
  pull_request:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: compile with debugging functionality
      printf:
        type: choice
        description: which debugging messages variant to use
        options:
        - NONE
        - PRINTF
        - EE_SIO
        - SCR
        - UDPTTY

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      DEBUG: 'DEBUG=1'
      PRINTF_ARGS: 'PPCTTY=1'
    steps:

      - name: Install dependencies
        run: |
          apk add build-base git p7zip python3

      - uses: actions/checkout@v6
      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Set output folders
        run: |
          if [ "${GITHUB_REF_NAME}" = "Retrogem-GAMEID" ]; then
            echo "OUT_ROOT=RETROGEM/" >> $GITHUB_ENV
            echo "ARTIFACT_DIR=RETROGEM" >> $GITHUB_ENV
            echo "USE_RELEASE=0" >> $GITHUB_ENV
          else
            echo "OUT_ROOT=" >> $GITHUB_ENV
            echo "ARTIFACT_DIR=release" >> $GITHUB_ENV
            echo "REL_DIR=release" >> $GITHUB_ENV
            echo "USE_RELEASE=1" >> $GITHUB_ENV
          fi

      - name: Resolve debug args (manual workflow)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            echo "DEBUG=1" >> $GITHUB_ENV
          else
            echo "DEBUG=" >> $GITHUB_ENV
          fi

      - name: Resolve printf args (manual workflow)
        if: github.event_name == 'workflow_dispatch'
        run: |
          PRINTF_INPUT="${{ github.event.inputs.printf }}"
          if [ -z "$PRINTF_INPUT" ] || [ "$PRINTF_INPUT" = "NONE" ]; then
            echo "PRINTF_ARGS=PRINTF=NONE" >> $GITHUB_ENV
          elif [ "$PRINTF_INPUT" = "UDPTTY" ]; then
            echo "PRINTF_ARGS=UDPTTY=1" >> $GITHUB_ENV
          else
            echo "PRINTF_ARGS=PRINTF=$PRINTF_INPUT" >> $GITHUB_ENV
          fi

      - name: Compile PSX-ALL-DRIVERS-LAZY-LOADING build
        run: |
          make release COMMIT_HASH=${GITHUB_SHA::7} BINDIR=${{ env.OUT_ROOT }}PSX-ALL-DRIVERS-LAZY-LOADING/ PSX_ALL_DRIVERS_LAZY_LOADING=1 EGSM_BUILD=1 EMBED_PS1VN=1 ${{ env.DEBUG }} ${{ env.PRINTF_ARGS }}

      - name: list
        run: |
          git ls-files -i --exclude-standard -c

      - name: prepare release folder
        if: env.USE_RELEASE == '1'
        run: |
          mkdir -p "${{ env.REL_DIR }}"
          cp LICENSE "${{ env.REL_DIR }}/LICENSE.TXT"
          cp README.md "${{ env.REL_DIR }}/README.md"
          cp tools/png_to_logo_rbga.py "${{ env.REL_DIR }}/png_to_logo_rbga.py"
          mv "${{ env.OUT_ROOT }}PSX-ALL-DRIVERS-LAZY-LOADING/" "${{ env.REL_DIR }}/PSX-ALL-DRIVERS-LAZY-LOADING/"

      - name: pack release
        if: env.USE_RELEASE == '1'
        run: |
          CSH=${GITHUB_SHA::7}
          DATE=$(date "+%d-%m-%Y")
          TARGET="PS2BBL[$DATE]-[$CSH]"
          cp -r release/ $TARGET/
          7z a -t7z PS2BBL.7z $TARGET/*

      - name: Upload artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: PSX-ALL-DRIVERS-LAZY-LOADING
          path: |
            ${{ env.ARTIFACT_DIR }}/**

      - name: Create prerelease
        if: github.ref == 'refs/heads/main' && env.USE_RELEASE == '1'
        uses: mathieucarbou/marvinpinto-action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: true
          automatic_release_tag: "latest"
          title: "Latest development build"
          files: |
            PS2BBL.7z
