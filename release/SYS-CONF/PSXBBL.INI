##################################
# NOTE: ARGUMENT Passing: ARG_<BUTTON>_E? =  is used to pass args to an ELF. This will be much faster than using nhddl.yaml
# Uncomment as needed: remove "# "
# ONE value per argument. Below are examples of possible values
# -video=ntsc,pal,480p
# -mode=usb,mx4sio,mmce,ilink,ata,hdl,udpbd
# -udpbd_ip=xxx.xxx.xxx.xxx
# -titleid=SLUS_123.45 (override app title ID, up to 11 chars)
# -appid (force app visual game ID even if APP_GAMEID=0)
# -disc_stop (stop disc after target ELF is loaded)
##################################
NAME_R1 = NHDDL
LK_R1_E1 = mc?:/APP_NHDDL/nhddl.elf
# ARG_R1_E1 = -video=480p
# ARG_R1_E1 = -mode=mmce
