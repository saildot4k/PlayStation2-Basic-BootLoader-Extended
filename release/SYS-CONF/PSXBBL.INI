# PlayStation2 Basic Bootloader config file
# configurations:
EJECT_TRAY = 0
OSDHISTORY_READ = 0
KEY_READ_WAIT_TIME = 6000
# LOGO_DISPLAY  0=off, 1=info, 2=logo & info, 3=banner & NAME_<BUTTON>, 4=banner & scanned filename, 5=banner & scanned path
LOGO_DISPLAY = 3
# CDROM_DISABLE_GAMEID: 1 disables visual game ID for discs (cdrom)
CDROM_DISABLE_GAMEID = 0
# APP_GAMEID: 1 enables visual game ID for apps/homebrew (also forced by -appid or -titleid=)
APP_GAMEID = 1
# DISC_STOP: 1 stops optical disc after config discovery ; 0 keeps default PS2 behavior
DISC_STOP = 1
##################################
# Add additional IRXs as needed. ORDER MATTERS
##################################
LOAD_IRX_E1 =
LOAD_IRX_E2 =
LOAD_IRX_E3 =
LOAD_IRX_E4 =
LOAD_IRX_E5 =


##################################
# Delete APP in MC BROWSER/wLE in order to fall on the desired app on power on, or add your own as desired.
# If you add another app such as OPL as E1, L2 will let you get back to HACKED OSDSYS/OSDSYS
##################################
NAME_AUTO = wLE ISR (MMCE -> MX4SIO -> exFAT)
LK_AUTO_E1 = mc?:/APP_WLE-ISR-XF-MM/WLE-ISR-XF-MM.ELF
